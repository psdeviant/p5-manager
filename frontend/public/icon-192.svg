<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!--
    P5 Manager — small app icon (192 × 192).
    Same geometry as icon-512 but with the strokes / radii thinned for the
    smaller canvas; otherwise hairline detail collapses on a tab favicon.
  -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%"   stop-color="#181b27" />
      <stop offset="55%"  stop-color="#0d0e15" />
      <stop offset="100%" stop-color="#06070b" />
    </radialGradient>
    <linearGradient id="mintCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7cffb3" />
      <stop offset="100%" stop-color="#7ddff5" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#7cffb3" stop-opacity="0.32" />
      <stop offset="45%"  stop-color="#7cffb3" stop-opacity="0.10" />
      <stop offset="100%" stop-color="#7cffb3" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="192" height="192" rx="42" fill="url(#bg)" />
  <ellipse cx="96" cy="106" rx="90" ry="64" fill="url(#halo)" />
  <rect x="1" y="1" width="190" height="190" rx="41"
        fill="none" stroke="rgba(124,255,179,0.20)" stroke-width="1" />

  <!-- Controller panel -->
  <path d="M 36 83
           Q 36 66 53 66
           L 139 66
           Q 156 66 156 83
           L 156 126
           Q 156 143 139 143
           L 53 143
           Q 36 143 36 126 Z"
        fill="rgba(255,255,255,0.035)"
        stroke="url(#mintCyan)" stroke-width="1.5" stroke-opacity="0.55" />

  <!-- Touchpad -->
  <rect x="82" y="77" width="28" height="9" rx="4.5"
        fill="rgba(124,255,179,0.18)"
        stroke="url(#mintCyan)" stroke-width="0.8" stroke-opacity="0.7" />

  <!-- D-pad -->
  <g transform="translate(52, 82)" fill="rgba(240,242,247,0.55)">
    <rect x="5" y="0" width="4" height="14" rx="1" />
    <rect x="0" y="5" width="14" height="4" rx="1" />
  </g>

  <!-- Face buttons -->
  <g transform="translate(130, 82)">
    <circle cx="7"  cy="0"  r="2.2" fill="#7cffb3" fill-opacity="0.85" />
    <circle cx="0"  cy="7"  r="2.2" fill="#c490ff" fill-opacity="0.85" />
    <circle cx="14" cy="7"  r="2.2" fill="#ff5d7a" fill-opacity="0.85" />
    <circle cx="7"  cy="14" r="2.2" fill="#7ddff5" fill-opacity="0.85" />
  </g>

  <!-- Sticks -->
  <circle cx="69" cy="114" r="17"
          fill="rgba(255,255,255,0.04)"
          stroke="url(#mintCyan)" stroke-width="1.5" stroke-opacity="0.85" />
  <circle cx="69" cy="114" r="6" fill="#7cffb3" />

  <circle cx="123" cy="114" r="17"
          fill="rgba(255,255,255,0.04)"
          stroke="url(#mintCyan)" stroke-width="1.5" stroke-opacity="0.85" />
  <circle cx="123" cy="114" r="6" fill="#7ddff5" />

  <!-- Wordmark -->
  <text x="96" y="168" text-anchor="middle"
        font-family="Geist, -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="20" font-weight="800" letter-spacing="2"
        fill="url(#mintCyan)">P5</text>
</svg>
