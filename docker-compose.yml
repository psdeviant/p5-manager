services:
  pyremoteplay:
    build:
      context: ./pyremoteplay
      dockerfile: Dockerfile
    image: pyremoteplay-sidecar:latest
    restart: unless-stopped
    # host networking so pyremoteplay can do UDP discovery + Remote Play
    # streaming with the PS5 directly on the LAN (no port forwarding pain).
    network_mode: host
    environment:
      - PYREMOTEPLAY_SIDECAR_HOST=127.0.0.1
      - PYREMOTEPLAY_SIDECAR_PORT=9555
      - PYREMOTEPLAY_SIDECAR_LOG=info

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Run as the host user that owns the repo. Defaults to 1000:1000, which
    # matches the first non-root user on most Linux distros (Debian, Ubuntu,
    # Fedora, Arch, Alpine, …). Override with P5M_UID / P5M_GID in a .env
    # file or your shell if your account uses different ids — `id -u` /
    # `id -g` will tell you. Keeps files written through the built-in editor
    # and freshly downloaded default payloads owned by the host user instead
    # of root, so you can edit / commit them without sudo.
    user: "${P5M_UID:-1000}:${P5M_GID:-1000}"
    volumes:
      - ./data:/app/data
      # Live mount of the editable built-ins folder. Saves from the hidden
      # editor (#builtin) land in this directory on the host, so edits are
      # tracked by git and survive `docker compose build`. The image still
      # ships a default copy at /app/builtin (see Dockerfile) so plain
      # `docker run` without compose keeps working.
      - ./frontend/builtin:/app/builtin
      # Host filesystem exposed to the file browser. Each entry below MUST
      # match the candidate list in backend/src/routes/downloader.js so every
      # "quick tab" rendered in the FileBrowser actually resolves to a real
      # directory — no dead chips. /mnt alone is enough: any disks the host
      # has already mounted at /mnt/sda1, /mnt/sdb1, etc. are visible inside
      # the container through the parent bind mount, no separate entries
      # required.
      - /mnt:/mnt
      - /home:/home
      # Host /data is exposed as three explicit subfolders instead of the
      # whole tree so unrelated dirs (notably /data/compose with other
      # docker-compose projects) stay out of the FileBrowser. Add another
      # bind here if a new manager-relevant subfolder is introduced.
      - /data/payloads:/data/payloads
      - /data/downloads:/data/downloads
      - /data/mkpfs:/data/mkpfs
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATA_DIR=/app/data
      - PYREMOTEPLAY_SIDECAR_URL=http://127.0.0.1:9555
    # The Convert -> PS5 exFAT pipeline creates a sparse image file, formats
    # it with mkfs.exfat, then loop-mounts it to inject the source files via
    # cp/rsync. losetup + mount(2) both need CAP_SYS_ADMIN; the host's MAC
    # layer (AppArmor / SELinux) and seccomp also block the FUSE/loop
    # syscalls until we unconfine the container (see security_opt below).
    # /dev/loop-control alone isn't enough — losetup needs to *see* the
    # individual /dev/loopN nodes to allocate one, so we pass the full range
    # through (the host pre-creates loop0..7; if your kernel uses
    # max_loop=N >8, just bump this list — Docker is fine with missing
    # entries being optional via device-cgroup-rules but `devices:` requires
    # explicit nodes). MKNOD is needed so the container can create new loop
    # devices on the fly if losetup -f exhausts the pre-existing pool.
    cap_add:
      - SYS_ADMIN
      - MKNOD
    # Runtime user needs membership in the host's `disk` group so it can
    # open the root:disk-owned /dev/loopN device nodes. gid 6 is `disk`
    # on Debian / Ubuntu / Fedora / Arch / Alpine / openSUSE — override
    # with P5M_DISK_GID if your host disagrees (`getent group disk`).
    # File caps on losetup / mount / umount / mkfs.exfat (set in the
    # Dockerfile) then handle the privileged syscalls themselves.
    group_add:
      - "${P5M_DISK_GID:-6}"
    security_opt:
      # AppArmor (Debian / Ubuntu / openSUSE) and SELinux (Fedora / RHEL)
      # both block the FUSE/loop/mount syscalls by default; unconfine so
      # SYS_ADMIN can take effect inside the container. SELinux users may
      # additionally need `label=disable` — uncomment if you see avc denials.
      - apparmor:unconfined
      # - label=disable
      # Docker's default seccomp profile drops `mount`, `umount2`, `mknod`
      # and several other syscalls even when CAP_SYS_ADMIN is in the
      # bounding set — that's why setuid-root mount still printed "must be
      # superuser to use mount". Unconfining seccomp lets the convert
      # worker's loop+mount sequence actually reach the kernel. If you'd
      # rather keep seccomp on, point this at a custom JSON profile that
      # allowlists at least: mount, umount2, mknod, mknodat, pivot_root,
      # ioctl(LOOP_*), and statfs.
      - seccomp:unconfined
    devices:
      - /dev/loop-control:/dev/loop-control
      - /dev/loop0:/dev/loop0
      - /dev/loop1:/dev/loop1
      - /dev/loop2:/dev/loop2
      - /dev/loop3:/dev/loop3
      - /dev/loop4:/dev/loop4
      - /dev/loop5:/dev/loop5
      - /dev/loop6:/dev/loop6
      - /dev/loop7:/dev/loop7
      - /dev/fuse:/dev/fuse
    depends_on:
      - pyremoteplay
    restart: unless-stopped
    network_mode: host
